<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">

  <meta name="description" content="Contact Gamora Hub — March 2026.">
  <title>Contact — Gamora Hub</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;700&family=Syne:wght@700;800&display=swap"
    rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>

<body class="gh-body">
  <header class="gh-top">
    <div class="gh-shell gh-top__in">
      <a href="index.html" class="gh-brand">
        <img src="assets/logo.webp" alt="Gamora Hub" width="200" height="48" decoding="async">
        <span class="gh-brand__tag"></span>
      </a>
      <button type="button" class="gh-burger" aria-label="Open menu" aria-expanded="false" aria-controls="gh-nav">
        <span></span><span></span><span></span>
      </button>
      <nav class="gh-nav" id="gh-nav">
        <a href="index.html">Home</a>
        <a href="games.html">Games</a>
        <a href="about.html">About</a>
        <a href="contact.html" class="is-active">Contact</a>
      </nav>
    </div>
  </header>

  <main class="gh-page gh-shell">
    <div class="contact-container">
      <h1>Contact</h1>
      <p class="gh-note">March 2026 · Wire this form to your mail API when you deploy.</p>

      <form class="gh-form" action="#" method="post" onsubmit="return false;">
        <div>
          <label for="t">Subject</label>
          <input type="text" id="t" name="subject" autocomplete="off">
        </div>
        <div>
          <label for="b">Message</label>
          <textarea id="b" name="body"></textarea>
        </div>
        <a href="mailto:hello@gamorahub.com?subject=Gamora%20Hub" class="gh-btn gh-btn--hi"
          style="text-decoration:none;width:fit-content">hello@gamorahub.com</a>
      </form>

      <p style="margin-top:1.5rem"><a href="index.html">← Home</a></p>

    </div>
  </main>

  <footer class="gh-foot">
    <div class="gh-shell">
      <p class="gh-foot__legal">Entertainment only · Virtual coins</p>
    </div>
  </footer>
  <script src="main.js"></script>
</body>

</html>
